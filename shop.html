<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZEEDO clothing — Shop</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>

    /* ── SHOP HERO ── */
    .shop-hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--grey-light);
    }

    .shop-hero__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    /* ── CATEGORY BLOCK ── */
    .category-block {
      padding: 72px 0;
      border-bottom: 1px solid var(--grey-light);
    }

    .category-block:last-child {
      border-bottom: none;
    }

    /* ── SECTION ROW: title left, "view more ->" right ── */
    .section-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--grey-light);
    }

    .section-row__left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* "view more ->" link — exact copy per wireframe */
    .view-more {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--grey-mid);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--transition);
      white-space: nowrap;
    }

    .view-more:hover {
      color: var(--black);
    }

    /* ── EMPTY STATE PER CATEGORY ── */
    .category-empty {
      grid-column: 1 / -1;
      padding: 56px 0;
      text-align: center;
      color: var(--grey-mid);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid var(--grey-light);
    }

    /* ── SKELETON LOADER ── */
    .skeleton-section {
      padding: 72px 0;
      border-bottom: 1px solid var(--grey-light);
    }

    .skeleton-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--grey-light);
    }

    .skeleton-label {
      height: 10px;
      width: 80px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      height: 28px;
      width: 160px;
    }

    .skeleton-link {
      height: 10px;
      width: 80px;
    }

    /* ── MODAL ── */
    #shopModal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,10,10,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #shopModal.open {
      opacity: 1;
      pointer-events: all;
    }

    #shopModal .modal-box {
      transform: translateY(18px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #shopModal.open .modal-box {
      transform: translateY(0);
    }

    /* ── FOOTER ── */
    .site-footer {
      padding: 40px 0 28px;
      border-top: 1px solid var(--grey-light);
    }

    .site-footer__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .site-footer__brand {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .site-footer__copy {
      font-size: 0.62rem;
      color: var(--grey-mid);
      letter-spacing: 0.08em;
    }

    @media (max-width: 768px) {
      .shop-hero__inner { flex-direction: column; align-items: flex-start; gap: 16px; }
      .site-footer__inner { flex-direction: column; align-items: flex-start; }
    }

  </style>
</head>

    </div>

  </main>

  <div id="shopModal" aria-modal="true" role="dialog" aria-label="Product details">
    <div class="modal-box">
      <button class="modal-box__close" id="shopModalClose" aria-label="Close">✕</button>

      <div class="modal-box__image" style="position: relative;">
        <button id="shopModalPrevBtn" class="gallery-arrow" style="display:none; position:absolute; left:12px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.85); border:none; width:28px; height:28px; font-weight:bold; cursor:pointer; font-size:0.75rem; z-index:10; border-radius:50%;">&lt;</button>
        <button id="shopModalNextBtn" class="gallery-arrow" style="display:none; position:absolute; right:12px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.85); border:none; width:28px; height:28px; font-weight:bold; cursor:pointer; font-size:0.75rem; z-index:10; border-radius:50%;">&gt;</button>
        <img id="shopModalImg" src="" alt="" style="display:none"/>
        <div id="shopModalPlaceholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--grey-light)">
          <span style="font-size:0.58rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--grey-mid)">Photo Coming Soon</span>
        </div>
      </div>

      <div class="modal-box__body">
        <p class="modal-box__category" id="shopModalCategory"></p>
        <h2 class="modal-box__title"    id="shopModalTitle"></h2>
        <p class="modal-box__price"     id="shopModalPrice"></p>
        <div class="modal-box__divider"></div>
        <div class="modal-box__colors">
          <label for="shopModalColor">Color</label>
          <div class="select-wrap">
            <select class="form-select" id="shopModalColor">
              <option value="">Select a color</option>
            </select>
          </div>
          <span class="form-error-msg" id="shopModalColorError">Please select a color.</span>
        </div>
        <div style="margin-top:auto;display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-primary btn-full" id="shopModalOrderBtn">Add to Cart</button>
          <button class="btn btn-ghost   btn-full" id="shopModalCloseBtn">Close</button>
        </div>
      </div>

    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <span class="site-footer__brand">ZEEDO <span style="font-weight:300">clothing</span></span>
        <span class="site-footer__copy">© 2026 ZEEDO clothing. Dhaka, Bangladesh.</span>
      </div>
    </div>
  </footer>
