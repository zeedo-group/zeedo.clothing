<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZEEDO clothing — Shop</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>

    /* ── SHOP HERO ── */
    .shop-hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--grey-light);
    }

    .shop-hero__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    /* ── CATEGORY BLOCK ── */
    .category-block {
      padding: 72px 0;
      border-bottom: 1px solid var(--grey-light);
    }

    .category-block:last-child {
      border-bottom: none;
    }

    /* ── SECTION ROW: title left, "view more ->" right ── */
    .section-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--grey-light);
    }

    .section-row__left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* "view more ->" link — exact copy per wireframe */
    .view-more {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--grey-mid);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--transition);
      white-space: nowrap;
    }

    .view-more:hover {
      color: var(--black);
    }

    /* ── EMPTY STATE PER CATEGORY ── */
    .category-empty {
      grid-column: 1 / -1;
      padding: 56px 0;
      text-align: center;
      color: var(--grey-mid);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid var(--grey-light);
    }

    /* ── SKELETON LOADER ── */
    .skeleton-section {
      padding: 72px 0;
      border-bottom: 1px solid var(--grey-light);
    }

    .skeleton-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--grey-light);
    }

    .skeleton-label {
      height: 10px;
      width: 80px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      height: 28px;
      width: 160px;
    }

    .skeleton-link {
      height: 10px;
      width: 80px;
    }

    /* ── MODAL ── */
    #shopModal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,10,10,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #shopModal.open {
      opacity: 1;
      pointer-events: all;
    }

    #shopModal .modal-box {
      transform: translateY(18px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #shopModal.open .modal-box {
      transform: translateY(0);
    }

    /* ── FOOTER ── */
    .site-footer {
      padding: 40px 0 28px;
      border-top: 1px solid var(--grey-light);
    }

    .site-footer__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .site-footer__brand {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .site-footer__copy {
      font-size: 0.62rem;
      color: var(--grey-mid);
      letter-spacing: 0.08em;
    }

    @media (max-width: 768px) {
      .shop-hero__inner { flex-direction: column; align-items: flex-start; gap: 16px; }
      .site-footer__inner { flex-direction: column; align-items: flex-start; }
    }

  </style>
</head>

  <!-- ══════════════════════════════════════
       SHOP ENGINE
  ══════════════════════════════════════ -->
  <script>
  /* ── PHOTO SLIDESHOW ENGINE ─────────────────────────── */
  const SLIDER = {
    slides: [],
    current: 0,
    container: null,
    counterEl: null,
    dotsEl: null,
    touchStartX: 0,

    // Build the slider DOM inside the given .modal-box__image element
    build(imageWrapEl, images) {
      imageWrapEl.innerHTML = '';
      this.slides = [];
      this.current = 0;

      const count = images.length;

      const slider = document.createElement('div');
      slider.className = 'photo-slider';
      slider.dataset.count = count;
      this.container = slider;

      // ── SLIDES ──
      if (count === 0) {
        const slide = document.createElement('div');
        slide.className = 'photo-slide photo-slide--placeholder active';
        slide.textContent = 'Photo Coming Soon';
        slider.appendChild(slide);
        this.slides.push(slide);
      } else {
        images.forEach((src, i) => {
          const slide = document.createElement('div');
          slide.className = 'photo-slide' + (i === 0 ? ' active' : '');
          const img = document.createElement('img');
          img.src     = src;
          img.alt     = 'Product photo ' + (i + 1);
          img.loading = i === 0 ? 'eager' : 'lazy';
          slide.appendChild(img);
          slider.appendChild(slide);
          this.slides.push(slide);
        });
      }

      // ── COUNTER (top-left) ──
      const counter = document.createElement('div');
      counter.className = 'photo-counter';
      counter.textContent = count > 0 ? '1 / ' + count : '';
      slider.appendChild(counter);
      this.counterEl = counter;

      // ── ARROWS ──
      const prev = document.createElement('button');
      prev.className = 'photo-arrow photo-arrow--prev';
      prev.type = 'button';
      prev.setAttribute('aria-label', 'Previous photo');
      prev.innerHTML = '&#8592;';
      prev.addEventListener('click', e => { e.stopPropagation(); this.go(this.current - 1); });
      slider.appendChild(prev);

      const next = document.createElement('button');
      next.className = 'photo-arrow photo-arrow--next';
      next.type = 'button';
      next.setAttribute('aria-label', 'Next photo');
      next.innerHTML = '&#8594;';
      next.addEventListener('click', e => { e.stopPropagation(); this.go(this.current + 1); });
      slider.appendChild(next);

      // ── DOTS ──
      if (count > 1) {
        const dots = document.createElement('div');
        dots.className = 'photo-dots';
        for (let i = 0; i < count; i++) {
          const dot = document.createElement('div');
          dot.className = 'photo-dot' + (i === 0 ? ' active' : '');
          dot.dataset.index = i;
          dot.addEventListener('click', e => { e.stopPropagation(); this.go(parseInt(e.target.dataset.index)); });
          dots.appendChild(dot);
        }
        slider.appendChild(dots);
        this.dotsEl = dots;
      }

      // ── TOUCH / SWIPE ──
      slider.addEventListener('touchstart', e => { this.touchStartX = e.changedTouches[0].clientX; }, { passive: true });
      slider.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - this.touchStartX;
        if (Math.abs(dx) > 40) this.go(this.current + (dx < 0 ? 1 : -1));
      }, { passive: true });

      // ── KEYBOARD (←/→ while modal open) ──
      this._keyHandler = e => {
        if (e.key === 'ArrowLeft')  this.go(this.current - 1);
        if (e.key === 'ArrowRight') this.go(this.current + 1);
      };

      imageWrapEl.appendChild(slider);
    },

    go(index) {
      const count = this.slides.length;
      if (count <= 1) return;
      // wrap around
      this.current = ((index % count) + count) % count;
      this.slides.forEach((s, i) => s.classList.toggle('active', i === this.current));
      if (this.counterEl) this.counterEl.textContent = (this.current + 1) + ' / ' + count;
      if (this.dotsEl) {
        [...this.dotsEl.querySelectorAll('.photo-dot')].forEach((d, i) =>
          d.classList.toggle('active', i === this.current)
        );
      }
    },

    bindKeys() { document.addEventListener('keydown', this._keyHandler); },
    unbindKeys() { if (this._keyHandler) document.removeEventListener('keydown', this._keyHandler); },
  };

  (function () {
    'use strict';

    // ── CONFIG ────────────────────────────────────────────
    const MAX_PER_CATEGORY = 6; // Top 6 cards shown per category (2 rows × 3 cols)

    // Category list — order here = order on page
    // label: display name in section header

      { file: 'shoes.html',            label: 'Shoes' },
      { file: 'watches.html',          label: 'Watches' },
      { file: 'perfumes.html',         label: 'Perfumes' },

    ];
    // ─────────────────────────────────────────────────────

    const fmt = window.ZEEDO?.formatPrice ?? (v => parseInt(v).toLocaleString('en-BD') + ' BDT');

    // ── MODAL STATE ──────────────────────────────────────
    let activeProduct = null;

    let shopModalQty = 1;

    function openModal(product) {
      activeProduct = product;
      shopModalQty  = 1;
      document.getElementById('shopModalQtyVal').textContent = '1';

      document.getElementById('shopModalTitle').textContent    = product.title;
      document.getElementById('shopModalPrice').textContent    = fmt(product.price);
      document.getElementById('shopModalCategory').textContent = product.category;

      // ── Build photo slideshow ──
      const rawImgs = (product.images || '').split(',').map(s => s.trim()).filter(Boolean);
      if (product.image && product.image.trim() !== '') rawImgs.unshift(product.image.trim());
      const uniqueImgs = [...new Set(rawImgs)].slice(0, 5);
      SLIDER.build(document.getElementById('shopModalImagePane'), uniqueImgs);
      SLIDER.bindKeys();

      // Rebuild color dropdown
      const select = document.getElementById('shopModalColor');
      select.innerHTML = '<option value="">Select a color</option>';
      select.classList.remove('error');
      document.getElementById('shopModalColorError').classList.remove('visible');

      product.colors.split(',').forEach(c => {
        const opt       = document.createElement('option');
        opt.value       = c.trim();
        opt.textContent = c.trim();
        select.appendChild(opt);
      });

      document.getElementById('shopModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('shopModal').classList.remove('open');
      document.body.style.overflow = '';
      activeProduct = null; SLIDER.unbindKeys();
    }

    function goToOrder(product) {
      localStorage.setItem('ZEEDO_CHECKOUT_ITEM', JSON.stringify(product));
      window.location.href = 'order.html';
    }

    // Quantity controls
    document.getElementById('shopModalQtyMinus').addEventListener('click', () => {
      if (shopModalQty > 1) { shopModalQty--; document.getElementById('shopModalQtyVal').textContent = shopModalQty; }
    });
    document.getElementById('shopModalQtyPlus').addEventListener('click', () => {
      shopModalQty++; document.getElementById('shopModalQtyVal').textContent = shopModalQty;
    });

    function validateColor() {
      const select = document.getElementById('shopModalColor');
      if (!select.value) {
        select.classList.add('error');
        document.getElementById('shopModalColorError').classList.add('visible');
        select.focus();
        return null;
      }
      return select.value;
    }

    // Order Now from modal — validate color first
    document.getElementById('shopModalOrderBtn').addEventListener('click', () => {
      if (!activeProduct) return;
      const color = validateColor();
      if (!color) return;
      goToOrder({ ...activeProduct, selectedColor: color, qty: shopModalQty });
    });

    // Add to Cart
    document.getElementById('shopModalAddCartBtn').addEventListener('click', () => {
      if (!activeProduct) return;
      const color = validateColor();
      if (!color) return;
      const addFn = window.ZEEDO?.addToCart;
      if (addFn) {
        for (let i = 0; i < shopModalQty; i++) addFn({ ...activeProduct, selectedColor: color });
      }
      closeModal();
    });

    // Close triggers
    document.getElementById('shopModalClose').addEventListener('click', closeModal);
    document.getElementById('shopModal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── FETCH & PARSE ────────────────────────────────────

    async function fetchCategory(file) {
      try {
        const res  = await fetch(file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        const doc  = new DOMParser().parseFromString(html, 'text/html');
        const cards= [...doc.querySelectorAll('.product-card')];

        if (cards.length === 0) throw new Error('No product cards found');

        return cards.slice(0, MAX_PER_CATEGORY).map(card => ({
          id:       card.dataset.id       || '',
          title:    card.dataset.title    || 'Untitled',
          price:    card.dataset.price    || '0',
          image:    card.dataset.image    || '',
          images:   card.dataset.images   || '',
          colors:   card.dataset.colors   || 'Black',
          category: card.dataset.category || 'Product',
        }));
      } catch (err) {
        // fetch() is blocked when the page is opened directly as a file
        // (file:// URLs can't fetch other local files due to CORS).
        // Fall back to the embedded static product data so the shop
        // page — and the photo slideshow — still works correctly.
        console.warn(`[shop.js] fetch failed for ${file}, using fallback data:`, err.message);
        return FALLBACK_PRODUCTS[file] || [];
      }
    }

    // ── BUILD CARD ───────────────────────────────────────

    function buildCard(product) {
      const card = document.createElement('div');
      card.className = 'product-card';

      // Image wrap
      const imgWrap = document.createElement('div');
      imgWrap.className = 'product-card__image-wrap';

      if (product.image && product.image.trim() !== '') {
        const img   = document.createElement('img');
        img.src     = product.image;
        img.alt     = product.title;
        img.loading = 'lazy';
        imgWrap.appendChild(img);
      } else {
        imgWrap.setAttribute('data-placeholder', 'Photo Coming Soon');
      }

      // Body
      const body = document.createElement('div');
      body.className = 'product-card__body';
      body.innerHTML = `
        <p class="product-card__category">${product.category}</p>
        <p class="product-card__title">${product.title}</p>
        <p class="product-card__price">${fmt(product.price)}</p>
        <div class="product-card__actions">
          <button class="btn btn-primary details-btn">Details</button>
          <button class="btn btn-outline order-btn">Order Now</button>
        </div>
      `;

      card.appendChild(imgWrap);
      card.appendChild(body);

      // Click: Details → open modal
      body.querySelector('.details-btn').addEventListener('click', () => openModal(product));

      // Click: Order Now → open modal (color must be selected first)
      body.querySelector('.order-btn').addEventListener('click', () => openModal(product));

      return card;
    }

    // ── BUILD CATEGORY SECTION ───────────────────────────

    function buildSection(catConfig, products) {
      const section = document.createElement('section');
      section.className = 'category-block';

      const inner = document.createElement('div');
      inner.className = 'container';

      // ── HEADING ROW ──
      // Category title: far left
      // "view more ->": far right, points to the exact file
      const row = document.createElement('div');
      row.className = 'section-row';
      row.innerHTML = `
        <div class="section-row__left">
          <p class="t-subheading">Zeedo Clothing</p>
          <h2 class="t-heading" style="margin-top:5px">${catConfig.label}</h2>
        </div>
        <a href="${catConfig.file}" class="view-more">view more -&gt;</a>
      `;

      inner.appendChild(row);

      // ── 3-COLUMN PRODUCT GRID (2 rows × 3 cards) ──
      const grid = document.createElement('div');
      grid.className = 'grid-3';

      if (products.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'category-empty';
        empty.textContent = 'Coming Soon — Products Being Added';
        grid.appendChild(empty);
      } else {
        products.forEach(p => grid.appendChild(buildCard(p)));
      }

      inner.appendChild(grid);
      section.appendChild(inner);
      return section;
    }

    // ── MAIN LOAD ────────────────────────────────────────

    async function loadShop() {
      const main     = document.getElementById('shopMain');
      const skeleton = document.getElementById('shopSkeleton');

      // Fetch all category files in parallel
      const results = await Promise.all(
        CATEGORIES.map(cat =>
          fetchCategory(cat.file).then(products => ({ cat, products }))
        )
      );

      // Remove skeleton loader
      skeleton.remove();

      // Inject category sections
      results.forEach(({ cat, products }) => {
        main.appendChild(buildSection(cat, products));
      });
    }

    // Kick off
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadShop);
    } else {
      loadShop();
    }

  })();
  </script>
