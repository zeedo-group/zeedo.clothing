<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZEEDO clothing — Shop</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>

    /* ── SHOP HERO ── */
    .shop-hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--grey-light);
    }

    .shop-hero__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    /* ── CATEGORY BLOCK ── */
    .category-block {
      padding: 72px 0;
      border-bottom: 1px solid var(--grey-light);
    }

    .category-block:last-child {
      border-bottom: none;
    }

    /* ── SECTION ROW: title left, "view more ->" right ── */
    .section-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--grey-light);
    }

    .section-row__left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* "view more ->" link — exact copy per wireframe */
    .view-more {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--grey-mid);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--transition);
      white-space: nowrap;
    }

    .view-more:hover {
      color: var(--black);
    }

    /* ── EMPTY STATE PER CATEGORY ── */
    .category-empty {
      grid-column: 1 / -1;
      padding: 56px 0;
      text-align: center;
      color: var(--grey-mid);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid var(--grey-light);
    }

    /* ── SKELETON LOADER ── */
    .skeleton-section {
      padding: 72px 0;
      border-bottom: 1px solid var(--grey-light);
    }

    .skeleton-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--grey-light);
    }

    .skeleton-label {
      height: 10px;
      width: 80px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      height: 28px;
      width: 160px;
    }

    .skeleton-link {
      height: 10px;
      width: 80px;
    }

    /* ── MODAL ── */
    #shopModal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,10,10,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #shopModal.open {
      opacity: 1;
      pointer-events: all;
    }

    #shopModal .modal-box {
      transform: translateY(18px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #shopModal.open .modal-box {
      transform: translateY(0);
    }

    /* ── FOOTER ── */
    .site-footer {
      padding: 40px 0 28px;
      border-top: 1px solid var(--grey-light);
    }

    .site-footer__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .site-footer__brand {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .site-footer__copy {
      font-size: 0.62rem;
      color: var(--grey-mid);
      letter-spacing: 0.08em;
    }

    @media (max-width: 768px) {
      .shop-hero__inner { flex-direction: column; align-items: flex-start; gap: 16px; }
      .site-footer__inner { flex-direction: column; align-items: flex-start; }
    }

  </style>
</head>
<body class="page-body page-body--has-subnav">

  <header></header>
  <script src="header.js" defer></script>

  <!-- ══════════════════════════════════════
       SHOP HERO
  ══════════════════════════════════════ -->
  <section class="shop-hero">
    <div class="container">
      <div class="shop-hero__inner">
        <div>
          <p class="t-subheading">Everything</p>
          <h1 class="t-heading" style="margin-top: 6px;">The Drop</h1>
        </div>
        <p class="t-body" style="max-width: 340px; text-align: right; color: var(--grey-mid);">
          Newest pieces at the top of every section.<br/>
          Tap Details to explore. Order in seconds.
        </p>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       DYNAMIC CATEGORY SECTIONS
       Built entirely by the shop engine below.
       Body is intentionally blank here.
  ══════════════════════════════════════ -->
  <main id="shopMain">

    <!-- Skeleton shown while JS fetches category files -->
    <div id="shopSkeleton">
      <!-- Repeat 3 skeleton blocks to fill the screen -->
      <div class="skeleton-section">
        <div class="container">
          <div class="skeleton-row">
            <div>
              <div class="skeleton skeleton-label"></div>
              <div class="skeleton skeleton-title"></div>
            </div>
            <div class="skeleton skeleton-link"></div>
          </div>
          <div class="loading-grid">
            <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div></div>
          </div>
        </div>
      </div>
      <div class="skeleton-section">
        <div class="container">
          <div class="skeleton-row">
            <div>
              <div class="skeleton skeleton-label"></div>
              <div class="skeleton skeleton-title"></div>
            </div>
            <div class="skeleton skeleton-link"></div>
          </div>
          <div class="loading-grid">
            <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text-sm"></div></div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ══════════════════════════════════════
       DETAILS MODAL
  ══════════════════════════════════════ -->
  <div id="shopModal" aria-modal="true" role="dialog" aria-label="Product details">
    <div class="modal-box">
      <button class="modal-box__close" id="shopModalClose" aria-label="Close">✕</button>

      <div class="modal-box__image" style="position: relative;">
        <button id="shopModalPrevBtn" class="gallery-arrow" style="display:none; position:absolute; left:12px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.85); border:none; width:36px; height:36px; font-size:1rem; cursor:pointer; z-index:10;">←</button>
        <button id="shopModalNextBtn" class="gallery-arrow" style="display:none; position:absolute; right:12px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.85); border:none; width:36px; height:36px; font-size:1rem; cursor:pointer; z-index:10;">→</button>
        <img id="shopModalImg" src="" alt="" style="display:none"/>
        <div id="shopModalPlaceholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--grey-light)">
          <span style="font-size:0.58rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--grey-mid)">Photo Coming Soon</span>
        </div>
      </div>

      <div class="modal-box__body">
        <p class="modal-box__category" id="shopModalCategory"></p>
        <h2 class="modal-box__title"    id="shopModalTitle"></h2>
        <p class="modal-box__price"     id="shopModalPrice"></p>
        <div class="modal-box__divider"></div>
        <div class="modal-box__colors">
          <label for="shopModalColor">Color</label>
          <div class="select-wrap">
            <select class="form-select" id="shopModalColor">
              <option value="">Select a color</option>
            </select>
          </div>
          <span class="form-error-msg" id="shopModalColorError">Please select a color.</span>
        </div>
        <div style="margin-top:auto;display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-primary btn-full" id="shopModalOrderBtn">Add to Cart</button>
          <button class="btn btn-ghost   btn-full" id="shopModalCloseBtn">Close</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <span class="site-footer__brand">ZEEDO <span style="font-weight:300">clothing</span></span>
        <span class="site-footer__copy">© 2026 ZEEDO clothing. Dhaka, Bangladesh.</span>
      </div>
    </div>
  </footer>

  <!-- ══════════════════════════════════════
       SHOP ENGINE
  ══════════════════════════════════════ -->
  <script>
  (function () {
    'use strict';

    // ── CONFIG ────────────────────────────────────────────
    const MAX_PER_CATEGORY = 6; // Top 6 cards shown per category (2 rows × 3 cols)

    // Category list — order here = order on page
    // label: display name in section header
    // file:  the HTML file that IS the product database
    const CATEGORIES = [
      { file: 'tshirts.html',          label: 'T-Shirts' },
      { file: 'shirts.html',           label: 'Shirts' },
      { file: 'trousers.html',         label: 'Trousers' },
      { file: 'shoes.html',            label: 'Shoes' },
      { file: 'watches.html',          label: 'Watches' },
      { file: 'perfumes.html',         label: 'Perfumes' },
      { file: 'more-accessories.html', label: 'Accessories' },
    ];
    // ─────────────────────────────────────────────────────

    const fmt = window.ZEEDO?.formatPrice ?? (v => parseInt(v).toLocaleString('en-BD') + ' BDT');

   // ── MODAL STATE ──────────────────────────────────────
    let activeProduct = null;
    let shopModalImages = [];
    let shopCurrentImgIndex = 0;

    function updateShopModalImage() {
      document.getElementById('shopModalImg').src = shopModalImages[shopCurrentImgIndex];
    }

    function openModal(product) {
      activeProduct = product;

      document.getElementById('shopModalTitle').textContent    = product.title;
      document.getElementById('shopModalPrice').textContent    = fmt(product.price);
      document.getElementById('shopModalCategory').textContent = product.category;

      const imgEl      = document.getElementById('shopModalImg');
      const placeholder= document.getElementById('shopModalPlaceholder');
      const prevBtn    = document.getElementById('shopModalPrevBtn');
      const nextBtn    = document.getElementById('shopModalNextBtn');

      if (product.image && product.image.trim() !== '') {
        shopModalImages = product.image.split(',').map(img => img.trim());
        shopCurrentImgIndex = 0;

        imgEl.src                 = shopModalImages[0];
        imgEl.alt                 = product.title;
        imgEl.style.display       = 'block';
        placeholder.style.display = 'none';

        if (shopModalImages.length > 1) {
          prevBtn.style.display = 'block';
          nextBtn.style.display = 'block';
        } else {
          prevBtn.style.display = 'none';
          nextBtn.style.display = 'none';
        }
      } else {
        shopModalImages = [];
        imgEl.style.display       = 'none';
        placeholder.style.display = 'flex';
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
      }

      const select = document.getElementById('shopModalColor');
      select.innerHTML = '<option value="">Select a color</option>';
      select.classList.remove('error');
      document.getElementById('shopModalColorError').classList.remove('visible');

      product.colors.split(',').forEach(c => {
        const opt       = document.createElement('option');
        opt.value       = c.trim();
        opt.textContent = c.trim();
        select.appendChild(opt);
      });

      // Reset add to cart button text state on load
      const cartBtn = document.getElementById('shopModalOrderBtn');
      cartBtn.textContent = "Add to Cart";
      cartBtn.disabled = false;

      document.getElementById('shopModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('shopModalPrevBtn').addEventListener('click', () => {
      if (shopModalImages.length <= 1) return;
      shopCurrentImgIndex = (shopCurrentImgIndex - 1 + shopModalImages.length) % shopModalImages.length;
      updateShopModalImage();
    });

    document.getElementById('shopModalNextBtn').addEventListener('click', () => {
      if (shopModalImages.length <= 1) return;
      shopCurrentImgIndex = (shopCurrentImgIndex + 1) % shopModalImages.length;
      updateShopModalImage();
    });

    function closeModal() {
      document.getElementById('shopModal').classList.remove('open');
      document.body.style.overflow = '';
      activeProduct = null;
    }

    // ── MULTI-ITEM CART ARRAY STORAGE ENGINE ──────────────────
    function commitToCart(productBundle) {
      let cart = JSON.parse(localStorage.getItem('ZEEDO_CART')) || [];

      // Check if product with identical ID and Color option is already queued
      let identicalItem = cart.find(item => item.id === productBundle.id && item.color === productBundle.selectedColor);

      if (identicalItem) {
        identicalItem.quantity += 1;
      } else {
        cart.push({
          id: productBundle.id,
          title: productBundle.title,
          price: parseInt(productBundle.price),
          category: productBundle.category,
          image: productBundle.image,
          color: productBundle.selectedColor,
          quantity: 1
        });
      }

      localStorage.setItem('ZEEDO_CART', JSON.stringify(cart));

      // Global notification event hook in case header widgets listen for live updates
      window.dispatchEvent(new Event('cartUpdated'));
      if (typeof window.updateCartCount === 'function') {
        window.updateCartCount();
      }
    }

    document.getElementById('shopModalOrderBtn').addEventListener('click', function() {
      if (!activeProduct) return;
      const select = document.getElementById('shopModalColor');
      
      if (!select.value) {
        select.classList.add('error');
        document.getElementById('shopModalColorError').classList.add('visible');
        select.focus();
        return;
      }

      this.textContent = "Added to Cart ✓";
      this.disabled = true;

      commitToCart({ 
        ...activeProduct, 
        image: shopModalImages[shopCurrentImgIndex] || '', 
        selectedColor: select.value 
      });

      // Smooth premium delayed dismissal
      setTimeout(closeModal, 600);
    });

    // Close triggers
    document.getElementById('shopModalClose').addEventListener('click', closeModal);
    document.getElementById('shopModalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('shopModal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── FETCH & PARSE ────────────────────────────────────

    async function fetchCategory(file) {
      try {
        const res  = await fetch(file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        const doc  = new DOMParser().parseFromString(html, 'text/html');
        const cards= [...doc.querySelectorAll('.product-card')];

        return cards.slice(0, MAX_PER_CATEGORY).map(card => ({
          id:       card.dataset.id       || '',
          title:    card.dataset.title    || 'Untitled',
          price:    card.dataset.price    || '0',
          image:    card.dataset.image    || '',
          colors:   card.dataset.colors   || 'Black',
          category: card.dataset.category || 'Product',
        }));
      } catch (err) {
        console.warn(`[shop.js] Could not load ${file}:`, err.message);
        return [];
      }
    }

    // ── BUILD CARD ───────────────────────────────────────

    function buildCard(product) {
      const card = document.createElement('div');
      card.className = 'product-card';

      // Image wrap
      const imgWrap = document.createElement('div');
      imgWrap.className = 'product-card__image-wrap';

     if (product.image && product.image.trim() !== '') {
        const img   = document.createElement('img');
        img.src     = product.image.split(',')[0].trim();
        img.alt     = product.title;
        img.loading = 'lazy';
        imgWrap.appendChild(img);
      } else {
        imgWrap.setAttribute('data-placeholder', 'Photo Coming Soon');
      }

      // Body
      const body = document.createElement('div');
      body.className = 'product-card__body';
      body.innerHTML = `
        <p class="product-card__category">${product.category}</p>
        <p class="product-card__title">${product.title}</p>
        <p class="product-card__price">${fmt(product.price)}</p>
        <div class="product-card__actions">
          <button class="btn btn-primary details-btn">Details</button>
          <button class="btn btn-outline order-btn">Order Now</button>
        </div>
      `;

      card.appendChild(imgWrap);
      card.appendChild(body);

      // Click: Details → open modal
      body.querySelector('.details-btn').addEventListener('click', () => openModal(product));

      // Click: Order Now → open modal (color must be selected first)
      body.querySelector('.order-btn').addEventListener('click', () => openModal(product));

      return card;
    }

    // ── BUILD CATEGORY SECTION ───────────────────────────

    function buildSection(catConfig, products) {
      const section = document.createElement('section');
      section.className = 'category-block';

      const inner = document.createElement('div');
      inner.className = 'container';

      // ── HEADING ROW ──
      // Category title: far left
      // "view more ->": far right, points to the exact file
      const row = document.createElement('div');
      row.className = 'section-row';
      row.innerHTML = `
        <div class="section-row__left">
          <p class="t-subheading">Zeedo Clothing</p>
          <h2 class="t-heading" style="margin-top:5px">${catConfig.label}</h2>
        </div>
        <a href="${catConfig.file}" class="view-more">view more -&gt;</a>
      `;

      inner.appendChild(row);

      // ── 3-COLUMN PRODUCT GRID (2 rows × 3 cards) ──
      const grid = document.createElement('div');
      grid.className = 'grid-3';

      if (products.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'category-empty';
        empty.textContent = 'Coming Soon — Products Being Added';
        grid.appendChild(empty);
      } else {
        products.forEach(p => grid.appendChild(buildCard(p)));
      }

      inner.appendChild(grid);
      section.appendChild(inner);
      return section;
    }

    // ── INTELLIGENT TOP NAVIGATION HEADER FIXER ──────────────────
    // Resolves broken header nav elements by routing text names to real filenames
    function fixHeaderLinks() {
      const links = document.querySelectorAll('header a, nav a, .subnav a, .menu a');
      if (!links.length) return;

      links.forEach(link => {
        const text = link.textContent.trim().toLowerCase();
        if (text.includes('t-shirt') || text.includes('tshirt')) {
          link.href = 'tshirts.html';
        } else if (text.includes('shirt') && !text.includes('t-')) {
          link.href = 'shirts.html';
        } else if (text.includes('trouser') || text.includes('pant')) {
          link.href = 'trousers.html';
        } else if (text.includes('shoe') || text.includes('sneaker')) {
          link.href = 'shoes.html';
        } else if (text.includes('watch')) {
          link.href = 'watches.html';
        } else if (text.includes('perfume') || text.includes('scent')) {
          link.href = 'perfumes.html';
        } else if (text.includes('accessor')) {
          link.href = 'more-accessories.html';
        }
      });
    }

    // ── MAIN LOAD ────────────────────────────────────────

    async function loadShop() {
      const main     = document.getElementById('shopMain');
      const skeleton = document.getElementById('shopSkeleton');

      // Fetch all category files in parallel
      const results = await Promise.all(
        CATEGORIES.map(cat =>
          fetchCategory(cat.file).then(products => ({ cat, products }))
        )
      );

      // Remove skeleton loader
      if (skeleton) skeleton.remove();

      // Inject category sections
      results.forEach(({ cat, products }) => {
        main.appendChild(buildSection(cat, products));
      });

      // Execute navigation binding after DOM settles from file assembly
      fixHeaderLinks();
      // Secondary deferred pass to outrun asynchronously injected layouts from header.js
      setTimeout(fixHeaderLinks, 400);
      setTimeout(fixHeaderLinks, 1000);
    }

    // Kick off
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadShop);
    } else {
      loadShop();
    }

  })();
  </script>

</body>
</html>
